<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>VG-MATCH // TERMINAL</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --terminal-bg: #191724; --terminal-fg: #e0def4; --terminal-black: #26233a; --terminal-red: #eb6f92;
      --terminal-green: #31748f; --terminal-yellow: #f6c177; --terminal-blue: #9ccfd8; --terminal-magenta: #c4a7e7;
      --terminal-cyan: #ebbcba; --primary: var(--terminal-cyan); --danger: var(--terminal-red);
      --success: var(--terminal-green); --warning: var(--terminal-yellow); --info: var(--terminal-blue);
      --border-color: #555169; --muted: #6e6a86;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--terminal-bg); color: var(--terminal-fg); font-family: 'JetBrains Mono', monospace; font-size: 14px; min-height: 100vh; }
    .screen { max-width: 640px; margin: 0 auto; border: 1px solid var(--border-color); background: var(--terminal-bg); min-height: 100vh; display: flex; flex-direction: column; }
    .navbar { padding: 8px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-color); }
    .navbar-brand { font-weight: bold; color: var(--primary); text-transform: uppercase; font-size: 0.85rem; }
    .server-status { display: flex; gap: 12px; font-size: 0.65rem; text-transform: uppercase; }
    .status-online { color: var(--muted); }
    .status-searching { color: var(--warning); }
    .tabs { display: flex; border-bottom: 1px solid var(--border-color); list-style: none; }
    .tabs li { flex: 1; }
    .tabs a { display: block; color: var(--muted); padding: 10px 14px; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; text-align: center; text-decoration: none; }
    .tabs li.is-active a { color: var(--primary); border-bottom: 2px solid var(--primary); font-weight: bold; }
    .content { flex: 1; padding: 12px; overflow-y: auto; display: flex; flex-direction: column; }
    .section-box { border: 1px solid var(--border-color); padding: 10px 12px; margin-bottom: 10px; }
    .section-header { color: var(--terminal-magenta); font-size: 0.65rem; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; padding-bottom: 6px; border-bottom: 1px solid var(--border-color); }
    .player-nick { font-size: 1.3rem; font-weight: bold; color: var(--terminal-fg); margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
    .player-fc { color: var(--warning); font-size: 0.85rem; display: flex; align-items: center; gap: 6px; }
    .spacer { flex: 1; }
    .queue-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; }
    .queue-label { font-size: 1.5rem; font-weight: 500; display: flex; align-items: center; gap: 10px; }
    .queue-searching-text { font-size: 0.75rem; color: var(--success); animation: blink 1s infinite; margin-right: 10px; }
    @keyframes blink { 50% { opacity: 0; } }
    .btn-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .button { flex: 1; background: transparent; border: 1px solid var(--border-color); color: var(--muted); cursor: pointer; padding: 12px 8px; text-transform: uppercase; font-size: 0.75rem; font-weight: bold; display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-family: inherit; transition: all 0.2s; }
    .button:hover { border-color: var(--terminal-fg); color: var(--terminal-fg); }
    .button.is-success { border-color: var(--success); color: var(--success); }
    .button.is-info { border-color: var(--info); color: var(--info); }
    .button.is-danger { border-color: var(--danger); color: var(--danger); }
    .button.is-fullwidth { flex: none; width: 100%; }
    .hidden { display: none !important; }
    .table { width: 100%; border-collapse: collapse; }
    .table th { text-align: left; border-bottom: 1px solid var(--border-color); color: var(--primary); font-size: 0.65rem; padding: 8px; }
    .table td { padding: 8px; border-bottom: 1px solid rgba(85, 81, 105, 0.2); font-size: 0.75rem; }
  </style>
</head>
<body>
<div class="screen">
  <nav class="navbar">
    <div class="navbar-brand"><i class="fa-solid fa-gamepad"></i> VG-MATCH</div>
    <div class="server-status">
      <span class="status-online"><i class="fa-solid fa-circle"></i> <span id="online-count">0</span> online</span>
      <span class="status-searching"><i class="fa-solid fa-magnifying-glass"></i> <span id="searching-count">0</span> buscando</span>
    </div>
  </nav>
  <ul class="tabs">
    <li class="is-active" onclick="showPage('lobby', this)"><a><i class="fa-solid fa-door-open"></i> Saguão</a></li>
    <li onclick="showPage('profile', this)"><a><i class="fa-solid fa-id-card"></i> Perfil</a></li>
    <li onclick="showPage('ranking', this)"><a><i class="fa-solid fa-ranking-star"></i> Ranking</a></li>
  </ul>
  <div class="content">
    <div id="lobby" style="display:flex;flex-direction:column;flex:1;">
      <div class="section-box">
        <div class="section-header"><i class="fa-solid fa-circle-info"></i> Jogador</div>
        <div id="me-nick" class="player-nick"><i class="fa-solid fa-user"></i> ...</div>
        <div id="me-fc" class="player-fc"><i class="fa-solid fa-id-card"></i> ...</div>
      </div>
      <div class="spacer"></div>
      <div id="queues-section" class="section-box hidden">
        <div class="section-header"><i class="fa-solid fa-magnifying-glass"></i> Filas Disponíveis</div>
        <div class="queue-row"><span class="queue-label"><i class="fa-solid fa-bullseye" style="color:var(--terminal-red)"></i> 3v3</span><div><span id="q3-searching" class="queue-searching-text hidden">BUSCANDO</span><span class="queue-count" id="queue-3v3-count">0/6</span></div></div>
        <div class="queue-row"><span class="queue-label"><i class="fa-solid fa-fire" style="color:var(--terminal-yellow)"></i> 5v5</span><div><span id="q5-searching" class="queue-searching-text hidden">BUSCANDO</span><span class="queue-count" id="queue-5v5-count">0/10</span></div></div>
      </div>
      <div class="section-box">
        <div class="section-header"><i class="fa-solid fa-bolt"></i> Ações</div>
        <div id="state-offline"><button class="button is-success is-fullwidth" onclick="setStatus('online')"><i class="fa-solid fa-plug"></i> FICAR ONLINE</button></div>
        <div id="state-online" class="hidden">
          <div class="btn-row">
            <button class="button is-success" onclick="joinQueue('3v3')"><i class="fa-solid fa-play"></i> JOGAR 3v3</button>
            <button class="button is-info" onclick="joinQueue('5v5')"><i class="fa-solid fa-play"></i> JOGAR 5v5</button>
          </div>
          <button class="button is-fullwidth" onclick="setStatus('offline')"><i class="fa-solid fa-power-off"></i> FICAR OFFLINE</button>
        </div>
        <div id="state-queue" class="hidden"><button class="button is-danger is-fullwidth" onclick="leaveQueue()"><i class="fa-solid fa-stop"></i> SAIR DA FILA</button></div>
      </div>
    </div>
    <div id="profile" class="hidden"><div class="section-box"><div class="section-header">Desempenho</div><div id="prof-stats"></div></div></div>
    <div id="ranking" class="hidden"><div class="section-box"><table class="table"><thead><tr><th>POS</th><th>NICK</th><th>FC</th><th>STATUS</th></tr></thead><tbody id="rank-list"></tbody></table></div></div>
  </div>
</div>
<script>
  const tg = window.Telegram.WebApp; const socket = io(); const USER_ID = tg.initDataUnsafe.user?.id || 123;
  let myStatus = 'offline'; let inQueueMode = null;
  function updateUI() {
    document.getElementById('state-offline').classList.toggle('hidden', myStatus !== 'offline');
    document.getElementById('state-online').classList.toggle('hidden', myStatus !== 'online');
    document.getElementById('state-queue').classList.toggle('hidden', myStatus !== 'in_queue');
    document.getElementById('queues-section').classList.toggle('hidden', myStatus === 'offline');
    document.getElementById('q3-searching').classList.toggle('hidden', inQueueMode !== '3v3');
    document.getElementById('q5-searching').classList.toggle('hidden', inQueueMode !== '5v5');
  }
  function showPage(id, el) {
    ['lobby', 'profile', 'ranking'].forEach(p => document.getElementById(p).classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
    document.querySelectorAll('.tabs li').forEach(t => t.classList.remove('is-active'));
    el.classList.add('is-active');
  }
  async function setStatus(status) { myStatus = status; if (status === 'offline') await leaveQueue(); updateUI(); }
  async function joinQueue(mode) {
    const r = await fetch('/api/queue/join', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ telegramId: USER_ID, mode }) });
    if (r.ok) { myStatus = 'in_queue'; inQueueMode = mode; updateUI(); }
  }
  async function leaveQueue() {
    await fetch('/api/queue/leave', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ telegramId: USER_ID }) });
    myStatus = 'online'; inQueueMode = null; updateUI();
  }
  socket.on('state_update', (state) => {
    document.getElementById('online-count').innerText = state.online || 0;
    document.getElementById('searching-count').innerText = state.searching || 0;
    document.getElementById('queue-3v3-count').innerText = `${state.queue3v3}/6`;
    document.getElementById('queue-5v5-count').innerText = `${state.queue5v5}/10`;
    document.getElementById('rank-list').innerHTML = (state.ranking || []).map(p => `<tr><td>#${p.pos}</td><td>${p.nick}</td><td style="color:var(--warning);">${p.fc}</td><td class="${p.fraud ? 'text-fraud' : 'text-clean'}">${p.fraud ? 'PUNIDO' : 'LIMPO'}</td></tr>`).join('');
  });
  async function loadPlayer() {
    const r = await fetch(`/api/player/${USER_ID}`); const p = await r.json();
    document.getElementById('me-nick').innerHTML = `<i class="fa-solid fa-user"></i> ${p.nick}`;
    document.getElementById('me-fc').innerHTML = `<i class="fa-solid fa-id-card"></i> ${p.fc}`;
    if (p.inQueue3v3 || p.inQueue5v5) { myStatus = 'in_queue'; inQueueMode = p.inQueue3v3 ? '3v3' : '5v5'; } else { myStatus = 'offline'; }
    updateUI();
    document.getElementById('prof-stats').innerHTML = `Vitórias: <b>${p.wins}</b> | Derrotas: <b>${p.losses}</b><br>Total: <b>${p.games} partidas</b>`;
  }
  loadPlayer(); tg.expand();
</script>
</body>
</html>
